services:
  - type: web
    name: checkout-proxy
    env: docker
    plan: standard
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: LOG_LEVEL
        value: INFO
    
    # Configurações de health check
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Timeout reduzido para refletir a otimização
    timeout: 15
    
    # Variáveis de build
    buildCommand: pip install -r requirements.txt && playwright install chromium
    
    # Configurações de log
    logging:
      level: info
      format: json
