services:
  - type: web
    name: checkout-proxy
    env: docker
    plan: standard  # Mínimo recomendado para performance
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PYTHONDONTWRITEBYTECODE
        value: 1
    
    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    
    # Timeout para requisição completar
    timeout: 30
    
    # Build command
    buildCommand: pip install -r requirements_ultra.txt && playwright install chromium
